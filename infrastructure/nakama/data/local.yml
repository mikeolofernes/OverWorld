name: overworld-local
data_dir: /nakama/data

logger:
  level: debug
  stdout: true

console:
  port: 7351
  username: admin
  password: admin

socket:
  port: 7349
  max_message_size_bytes: 4096
  ping_period_ms: 15000
  pong_wait_ms: 25000

api:
  port: 7350

session:
  token_expiry_sec: 86400

runtime:
  js_entrypoint: modules/build/main.js
  min_count: 1
  max_count: 8
  call_stack_size: 128
  max_count: 256
