version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.20.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-c"
      - >
        /nakama/nakama migrate up
        --database.address postgres://postgres:localdev@postgres:5432/nakama &&
        exec /nakama/nakama
        --database.address postgres://postgres:localdev@postgres:5432/nakama
        --config /nakama/data/local.yml
    ports:
      - "7350:7350"   # HTTP API + WebSocket
      - "7351:7351"   # Console UI
    volumes:
      - ./nakama/data:/nakama/data
      - ../server/build:/nakama/data/modules/build:ro
    environment:
      NAKAMA_SERVER_KEY: overworld-local-key

  # Production swap: replace postgres service above with this block
  # and update database.address to the CockroachDB connection string.
  # cockroachdb:
  #   image: cockroachdb/cockroach:v23.1.0
  #   command: start-single-node --insecure
  #   ports:
  #     - "26257:26257"
  #     - "8080:8080"
  #   volumes:
  #     - cockroach_data:/cockroach/cockroach-data

volumes:
  pgdata:
  # cockroach_data:
