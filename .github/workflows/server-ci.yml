name: Server CI

on:
  push:
    paths:
      - 'server/**'
  pull_request:
    paths:
      - 'server/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Typecheck
        working-directory: server
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: server
        run: npm test

      - name: Build bundle
        working-directory: server
        run: npm run build

      - name: Verify bundle exists
        run: test -f server/build/main.js && echo "Bundle OK"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nakama-runtime-bundle
          path: server/build/main.js
          retention-days: 7
